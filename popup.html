<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Glimpse</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0d17;
      --surface:   #12152a;
      --surface-2: #181c31;
      --border:    #1e2340;
      --border-2:  #262d50;
      --text:      #e4e8f5;
      --muted:     #505878;
      --dim:       #2e3554;
      --accent:    #7c5cfc;
      --accent-2:  #a07cfd;
      --glow:      rgba(124, 92, 252, 0.22);
      --green:     #3ddc84;
      --r:         10px;
      --r-sm:      7px;
    }

    body {
      width: 300px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 12.5px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ─────────────────────────────── */
    .header {
      padding: 14px 15px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(124,92,252,0.08) 0%, transparent 100%);
    }
    .brand { display: flex; align-items: center; gap: 9px; }
    .brand-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #6342e8, #9d5cfc);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 16px rgba(124,92,252,0.5);
      flex-shrink: 0;
    }
    .brand-name    { font-size: 14px; font-weight: 700; letter-spacing: 0.03em; }
    .brand-tagline { font-size: 9.5px; color: var(--muted); margin-top: 1px; }
    .header-chip {
      font-size: 8.5px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted);
      background: var(--surface); border: 1px solid var(--border);
      padding: 3px 8px; border-radius: 20px;
      font-family: 'Consolas', 'Courier New', monospace;
    }

    /* ── BODY ───────────────────────────────── */
    .body { padding: 16px 14px; display: flex; flex-direction: column; gap: 13px; }

    /* ── HERO DESCRIPTION ───────────────────── */
    .hero-desc {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 11px 12px;
    }
    .hero-desc-icon { flex-shrink: 0; color: var(--accent-2); margin-top: 1px; }
    .hero-desc-text { font-size: 11.5px; color: var(--muted); line-height: 1.6; }
    .hero-desc-text strong { color: var(--text); font-weight: 600; }

    /* ── SUMMARIZE BUTTON ───────────────────── */
    .btn-summarize {
      width: 100%;
      padding: 12px 16px;
      background: linear-gradient(135deg, #6342e8, #9d5cfc);
      color: #fff;
      border: none;
      border-radius: var(--r);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.03em;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 18px rgba(100,64,232,0.4);
      position: relative; overflow: hidden;
    }
    .btn-summarize::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
    }
    .btn-summarize:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(100,64,232,0.55); }
    .btn-summarize:active { transform: translateY(0); }

    /* ── DETAIL PILLS ───────────────────────── */
    .detail-row { display: flex; align-items: center; gap: 8px; }
    .detail-label {
      font-size: 9.5px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted); flex-shrink: 0;
      font-family: 'Consolas', 'Courier New', monospace;
    }
    .pills { display: flex; gap: 4px; flex: 1; }
    .pill {
      flex: 1; padding: 5px 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; color: var(--muted);
      font-size: 10.5px; font-weight: 500; cursor: pointer;
      transition: all 0.15s; text-align: center;
    }
    .pill:hover { border-color: var(--border-2); color: var(--text); }
    .pill.active {
      background: rgba(124,92,252,0.18);
      border-color: rgba(124,92,252,0.5);
      color: var(--accent-2);
      font-weight: 600;
    }

    /* ── FOOTER ─────────────────────────────── */
    .footer {
      padding: 9px 14px 12px;
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid var(--border);
    }
    .status { display: flex; align-items: center; gap: 5px; font-size: 10px; font-family: 'Consolas', 'Courier New', monospace; }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 6px rgba(61,220,132,0.5);
    }
    .status-msg { color: var(--green); }
    .footer-badge {
      font-size: 8.5px; color: var(--dim);
      font-family: 'Consolas', 'Courier New', monospace;
      background: var(--surface); border: 1px solid var(--border);
      padding: 2px 7px; border-radius: 20px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="brand">
      <div class="brand-icon">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">Glimpse</div>
        <div class="brand-tagline">Instant Page Summarizer</div>
      </div>
    </div>
    <div class="header-chip">v1.0</div>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- Summarize button -->
    <button class="btn-summarize" id="btn-summarize">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      Summarize This Page
    </button>

    <!-- Detail level -->
    <div class="detail-row">
      <span class="detail-label">Detail</span>
      <div class="pills">
        <button class="pill" data-level="brief">Brief</button>
        <button class="pill active" data-level="standard">Standard</button>
        <button class="pill" data-level="detailed">Detailed</button>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="status">
      <div class="status-dot"></div>
      <span class="status-msg">Ready</span>
    </div>
    <div class="footer-badge">100% client-side</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
